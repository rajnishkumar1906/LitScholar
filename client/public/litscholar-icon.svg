<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Graduation cap / Scholar's hat (top) -->
  <path d="M50 15 L20 30 L50 45 L80 30 L50 15Z" fill="url(#gradCap)" stroke="url(#gradStroke)" stroke-width="2"/>
  <rect x="45" y="40" width="10" height="20" fill="url(#gradBook)" rx="2"/>
  
  <!-- Open book base -->
  <path d="M25 60 L75 60 L75 85 L25 85 L25 60Z" fill="url(#gradBook)" stroke="url(#gradStroke)" stroke-width="2" rx="4"/>
  
  <!-- Book pages (left side) -->
  <path d="M30 62 L45 62 L45 82 L30 82Z" fill="white" fill-opacity="0.9"/>
  <path d="M32 65 L43 65" stroke="url(#gradStroke)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <path d="M32 70 L43 70" stroke="url(#gradStroke)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <path d="M32 75 L43 75" stroke="url(#gradStroke)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <path d="M32 80 L43 80" stroke="url(#gradStroke)" stroke-width="1.5" stroke-dasharray="3 2"/>
  
  <!-- Book pages (right side) -->
  <path d="M55 62 L70 62 L70 82 L55 82Z" fill="white" fill-opacity="0.9"/>
  <path d="M57 65 L68 65" stroke="url(#gradStroke)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <path d="M57 70 L68 70" stroke="url(#gradStroke)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <path d="M57 75 L68 75" stroke="url(#gradStroke)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <path d="M57 80 L68 80" stroke="url(#gradStroke)" stroke-width="1.5" stroke-dasharray="3 2"/>
  
  <!-- Quill pen (scholar symbol) -->
  <path d="M82 20 L92 30 L85 37 L75 27 L82 20Z" fill="url(#gradAccent)" stroke="url(#gradStroke)" stroke-width="1.5"/>
  <path d="M78 24 L88 34" stroke="url(#gradStroke)" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Sparkles for AI/magic -->
  <circle cx="18" cy="45" r="3" fill="white" stroke="url(#gradStroke)" stroke-width="1"/>
  <circle cx="12" cy="52" r="2" fill="white" stroke="url(#gradStroke)" stroke-width="1"/>
  <circle cx="22" cy="55" r="2" fill="white" stroke="url(#gradStroke)" stroke-width="1"/>
  
  <!-- Gradients - Scholarly brown/gold tones -->
  <defs>
    <linearGradient id="gradCap" x1="20" y1="15" x2="80" y2="45" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B8860B"/>  <!-- Dark golden rod -->
      <stop offset="0.5" stop-color="#8B4513"/> <!-- Saddle brown -->
      <stop offset="1" stop-color="#5D3A1A"/> <!-- Dark brown -->
    </linearGradient>
    
    <linearGradient id="gradBook" x1="25" y1="25" x2="75" y2="85" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5A2B"/> <!-- Medium brown -->
      <stop offset="0.6" stop-color="#A0522D"/> <!-- Sienna -->
      <stop offset="1" stop-color="#5D3A1A"/> <!-- Dark brown -->
    </linearGradient>
    
    <linearGradient id="gradStroke" x1="15" y1="15" x2="85" y2="85" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B4513"/>
      <stop offset="1" stop-color="#5D3A1A"/>
    </linearGradient>
    
    <linearGradient id="gradAccent" x1="75" y1="20" x2="92" y2="37" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CD7F32"/> <!-- Bronze -->
      <stop offset="1" stop-color="#B8860B"/> <!-- Dark golden rod -->
    </linearGradient>
    
    <radialGradient id="gradGlow" cx="50" cy="50" r="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CD7F32" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#5D3A1A" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>